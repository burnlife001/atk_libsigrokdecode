name: Build Windows DLL

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-win64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-python3
            mingw-w64-x86_64-pkg-config
            autoconf
            automake-wrapper
            libtool

      - name: Build
        shell: msys2 {0}
        run: |
          set -e

          # Add atk_decoder.c to the library sources
          sed -i '/^libsigrokdecode_la_SOURCES = \\/a\
          \tatk_decoder.c \\' Makefile.am

          # Add atk_decoder.h to installed headers
          sed -i '/^pkginclude_HEADERS/s/$/ atk_decoder.h/' Makefile.am

          ./autogen.sh
          ./configure --enable-shared --disable-static LDFLAGS="-Wl,--export-all-symbols"
          make -j$(nproc)

          # Collect outputs (libtool puts DLL in .libs/)
          mkdir -p output/bin output/include
          cp .libs/libsigrokdecode-*.dll output/bin/ 2>/dev/null || true
          cp .libs/libirmp-*.dll output/bin/ 2>/dev/null || true
          cp libsigrokdecode.h atk_decoder.h output/include/
          # version.h is generated by configure in the build root
          cp version.h output/include/

          # Generate .def for MSVC import lib
          DLL=$(find output/bin -name "libsigrokdecode-*.dll" | head -1)
          if [ -f "$DLL" ]; then
            gendef "$DLL"
            mv *.def output/bin/
          fi

          echo "=== Build output ==="
          ls -la output/bin/ output/include/

      - name: Setup MSVC and create import library
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Create MSVC import lib
        shell: pwsh
        run: |
          $def = Get-ChildItem -Path output/bin -Filter "*.def" | Select-Object -First 1
          if ($def) {
            lib /def:"$($def.FullName)" /out:output/bin/libsigrokdecode.lib /machine:x64
          }
          Get-ChildItem output/bin/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atk_libsigrokdecode-win64
          path: |
            output/bin/*.dll
            output/bin/*.lib
            output/bin/*.def
            output/include/*.h
